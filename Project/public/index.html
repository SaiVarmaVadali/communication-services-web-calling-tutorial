<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <!-- Fluent UI's CSS: https://developer.microsoft.com/en-us/fluentui#/get-started/web#fabric-core -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>
    <title>ACS Calling Sample</title>
  </head>
  <body class="ms-Fabric" dir="ltr">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" class="Root"></div>
    <script type="text/javascript">
      window.FabricConfig = {
      };
      
      // Load ESM or UMD bundle based on URL query parameter
      (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var bundleType = urlParams.get('bundle');
        var script = document.createElement('script');
        
        if (bundleType === 'esm') {
          script.type = 'module';
          script.src = '/esm/bundle.js';
        } else {
          script.src = '/umd/bundle.js';
        }
        
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
